# Learning Outcomes

> **Quick Note on Imperative Programming and Procedural Programming**
> 
> People usually use the terms Imperative programming and procedural programming interchangeably. Procedural programming is a subparadigm of imperative programming family, but some people refer to procedural programming as imperative programming. That's because other imperative paradigms like object-oriented programming is derived from procedural programming. You can think procedural programming as the ancestor if other imperative paradigms.
>

# The STATE

---
# The STATE

- The **state** of a program or a process on a given instance is the snapshot of its immediate relevant environment and context.


---

# The STATE

```c
int x = 3
int y = 4
x = x + y

```

---

# The STATE

- At the start of runtime, the state of this program would be (*for all intents and purposes*) empty, since there are no relevant variables declared at this point.


---

# The STATE

| variable | value |
|:---:|:---:|
| `x` | 3 |


---

# The STATE

| variable | value |
|:---:|:---:|
| `x` | 3 |
| `y` | 4 |


---

# The STATE

| variable | value |
|:---:|:---:|
| `x` | 7 |
| `y` | 4 |

# Assignment Statement

---
# Assignment Statement

- Instead of communicating some kind proposition, the assignment statement has an **imperative mood**.
- An equality a=b in math **declares** that some `a` is `b`, while an assignment operator `a=b` **commands** that `a`'s value is now the same as `b`.
- Mutation is introduced once you perform an assignment to `a` again, signifying a **change** in the value of `a`.

# Structured Program Theorem

---
# Structured Program Theorem

1. Executing one subprogram, and then another subprogram (sequence)
2. Executing one of two subprograms according to the value of a boolean (selection)
3. Repeatedly executing a subprogram as long as a boolean expression is true (iteration)
